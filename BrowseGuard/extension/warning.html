<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BrowseGuard Warning</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border: 2px solid #e74c3c;
      border-radius: 20px;
      padding: 36px 32px 28px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(231,76,60,0.13);
    }

    /* Shield SVG icon */
    .shield-wrap {
      margin-bottom: 14px;
    }
    .shield-wrap svg {
      width: 64px;
      height: 64px;
    }

    h1 { color: #e74c3c; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #aaa; margin-bottom: 22px; }

    /* Score box */
    .score-box {
      background: #fff5f5;
      border-radius: 14px;
      padding: 18px 16px 14px;
      margin-bottom: 14px;
    }
    .score-num {
      font-size: 54px;
      font-weight: 800;
      color: #e74c3c;
      line-height: 1;
    }
    .score-label { font-size: 12px; color: #bbb; margin-top: 4px; }
    .score-bar {
      height: 6px;
      background: #ececec;
      border-radius: 3px;
      margin-top: 12px;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      background: #e74c3c;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    /* URL box */
    .url-box {
      background: #f8f8f8;
      border: 1px solid #eee;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      color: #555;
      margin-bottom: 12px;
      word-break: break-all;
      text-align: left;
    }

    /* Reasons */
    .reasons { text-align: left; margin-bottom: 12px; }
    .reason {
      font-size: 12px;
      color: #555;
      padding: 7px 10px;
      background: #fff5f5;
      border-left: 3px solid #e74c3c;
      border-radius: 0 6px 6px 0;
      margin-bottom: 5px;
    }

    /* AI box — structured rows */
    .ai-box {
      background: #fff8e1;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
      text-align: left;
      border-left: 3px solid #f39c12;
      display: none;
    }
    .ai-box-header {
      font-size: 11px;
      font-weight: 700;
      color: #f39c12;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .ai-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      align-items: flex-start;
      font-size: 12.5px;
      line-height: 1.5;
    }
    .ai-row:last-child { margin-bottom: 0; }
    .ai-label {
      font-weight: 700;
      color: #888;
      min-width: 62px;
      font-size: 11px;
      padding-top: 1px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .ai-value { color: #333; flex: 1; }
    .ai-action-leave {
      display: inline-block;
      margin-top: 8px;
      background: #e74c3c;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }
    .ai-action-caution {
      display: inline-block;
      margin-top: 8px;
      background: #f39c12;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }
    .ai-raw {
      font-size: 12.5px;
      color: #444;
      line-height: 1.6;
    }

    /* Real site box */
    .real-site {
      background: #e8f5e9;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: none;
      align-items: center;
      justify-content: space-between;
      text-align: left;
      border: 1px solid #c8e6c9;
    }
    .real-site-info { flex: 1; }
    .real-site-label {
      font-size: 10px;
      color: #388e3c;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .real-site-name { font-size: 14px; color: #1b5e20; font-weight: 700; }
    .real-site-url { font-size: 11px; color: #388e3c; margin-top: 1px; }
    .real-site-btn {
      background: #27ae60;
      color: white;
      border: none;
      padding: 9px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-left: 14px;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .real-site-btn:hover { background: #219a52; }

    /* Buttons */
    .buttons { display: flex; gap: 10px; margin-top: 4px; }
    .btn-leave {
      flex: 1;
      background: #e74c3c;
      color: white;
      border: none;
      padding: 13px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-continue {
      flex: 1;
      background: #f0f0f0;
      color: #555;
      border: none;
      padding: 13px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-leave:hover { background: #c0392b; }
    .btn-continue:hover { background: #e0e0e0; }
  </style>
</head>
<body>
<div class="card">

  <!-- Shield SVG (matches screenshot) -->
  <div class="shield-wrap">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 4L8 14v18c0 13.3 10.3 25.7 24 29 13.7-3.3 24-15.7 24-29V14L32 4z"
            fill="#1a1a2e" stroke="#e74c3c" stroke-width="2"/>
      <path d="M32 12L14 20v12c0 8.8 6.8 17 18 19.3C44.2 49 51 40.8 51 32V20L32 12z"
            fill="#2d2d4e"/>
      <!-- Lightning / crack mark -->
      <path d="M35 22l-6 10h5l-4 10 10-13h-6l5-7z"
            fill="#e74c3c" stroke="#e74c3c" stroke-width="0.5" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>BrowseGuard Blocked This Page</h1>
  <p class="subtitle">This site was identified as potentially dangerous</p>

  <!-- Score -->
  <div class="score-box">
    <div class="score-num" id="score-num">5</div>
    <div class="score-label">Risk Score /100</div>
    <div class="score-bar">
      <div class="score-fill" id="score-fill" style="width:5%"></div>
    </div>
  </div>

  <!-- URL -->
  <div class="url-box" id="url-box">Analyzing...</div>

  <!-- Reasons -->
  <div class="reasons" id="reasons-box"></div>

  <!-- AI analysis box -->
  <div class="ai-box" id="ai-box">
    <div class="ai-box-header">🤖 AI THREAT ANALYSIS</div>
    <div id="ai-content"></div>
  </div>

  <!-- Real site suggestion -->
  <div class="real-site" id="real-site-box">
    <div class="real-site-info">
      <div class="real-site-label">✅ REAL WEBSITE</div>
      <div class="real-site-name" id="real-name-el"></div>
      <div class="real-site-url" id="real-url-el"></div>
    </div>
    <button class="real-site-btn" id="real-site-btn">Go There →</button>
  </div>

  <!-- Action buttons -->
  <div class="buttons">
    <button class="btn-leave" id="btn-back">← Go Back (Safe)</button>
    <button class="btn-continue" id="btn-continue">Continue Anyway</button>
  </div>

</div>
<script src="warning.js"></script>
</body>
</html>
