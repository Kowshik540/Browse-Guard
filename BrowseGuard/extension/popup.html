<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>BrowseGuard</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width:300px;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#f8f9fa;
      color:#1a1a1a;
    }
    .header {
      background:#1a1a2e;
      color:white;
      padding:14px 16px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .header h1 { font-size:16px; font-weight:600; }
    .score-card {
      background:white;
      margin:12px;
      border-radius:12px;
      padding:16px;
      text-align:center;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }
    .score-number { font-size:50px; font-weight:700; line-height:1; }
    .score-label { font-size:12px; color:#999; margin-top:4px; }
    .score-bar {
      height:6px;
      background:#eee;
      border-radius:3px;
      margin:10px 0 8px;
      overflow:hidden;
    }
    .score-fill { height:100%; border-radius:3px; transition:width 0.5s,background 0.5s; }
    .badge {
      display:inline-block;
      padding:3px 10px;
      border-radius:20px;
      font-size:11px;
      font-weight:600;
    }
    .safe   { color:#27ae60; background:#e8f8f0; }
    .warn   { color:#f39c12; background:#fef9e7; }
    .danger { color:#e74c3c; background:#fdf0ef; }
    .stats-row { display:flex; gap:8px; margin:0 12px 12px; }
    .stat-box {
      flex:1;
      background:white;
      border-radius:10px;
      padding:10px;
      text-align:center;
      box-shadow:0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-number { font-size:22px; font-weight:700; color:#1a1a2e; }
    .stat-label { font-size:10px; color:#999; margin-top:2px; }
    .last-visit {
      background:white;
      margin:0 12px 12px;
      border-radius:10px;
      padding:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.06);
    }
    .last-visit h3 {
      font-size:11px;
      color:#999;
      text-transform:uppercase;
      letter-spacing:0.5px;
      margin-bottom:8px;
    }
    .visit-url {
      font-size:12px;
      color:#333;
      word-break:break-all;
      background:#f5f5f5;
      padding:6px 8px;
      border-radius:6px;
      margin-bottom:6px;
    }
    .reason-item {
      font-size:11px;
      color:#666;
      padding:4px 8px;
      background:#fff5f5;
      border-left:3px solid #e74c3c;
      border-radius:0 6px 6px 0;
      margin-bottom:3px;
    }
    .no-reason {
      font-size:11px;
      color:#27ae60;
      padding:4px 8px;
      background:#f0fdf4;
      border-left:3px solid #27ae60;
      border-radius:0 6px 6px 0;
    }
    .dashboard-btn {
      display:block;
      margin:0 12px 12px;
      padding:11px;
      background:#1a1a2e;
      color:white;
      border:none;
      border-radius:10px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      text-align:center;
      width:calc(100% - 24px);
    }
    .dashboard-btn:hover { background:#16213e; }
    .no-data { text-align:center; color:#bbb; font-size:12px; padding:16px; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:22px">🛡️</span>
    <h1>BrowseGuard</h1>
  </div>

  <div class="score-card">
    <div class="score-number" id="score-number">--</div>
    <div class="score-label">Session Risk Score</div>
    <div class="score-bar">
      <div class="score-fill" id="score-fill" style="width:0%;background:#27ae60"></div>
    </div>
    <span class="badge safe" id="status-badge">Loading...</span>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-number" id="total-visits">0</div>
      <div class="stat-label">Sites visited</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="flagged-count" style="color:#e74c3c">0</div>
      <div class="stat-label">Flagged</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="safe-count" style="color:#27ae60">0</div>
      <div class="stat-label">Safe</div>
    </div>
  </div>

  <div class="last-visit">
    <h3>Last checked site</h3>
    <div id="last-visit-content" class="no-data">Browse the web to start tracking.</div>
  </div>

  <button class="dashboard-btn" onclick="openDashboard()">
    📊 Open Full Dashboard
  </button>

  <script src="popup.js"></script>
</body>
</html>
